<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REPRODUCTOR M3U PRO</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --bg: #050a14;
            --card: #101827;
            --text: #ffffff;
            --accent: #ff007a;
            --success: #10b981;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: radial-gradient(circle at top, #1e1b4b, var(--bg));
            color: var(--text);
            margin: 0;
            padding: 15px;
            min-height: 100vh;
        }

        .container { max-width: 900px; margin: 0 auto; }

        .header {
            text-align: center;
            padding: 15px;
            background: linear-gradient(90deg, var(--secondary), var(--primary));
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.4);
        }

        .header h1 { margin: 0; font-size: 1.8rem; text-transform: uppercase; letter-spacing: 1px; }

        .section-box {
            background: var(--card);
            border: 1px solid #1e293b;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
        }

        label { font-weight: bold; color: var(--primary); display: block; margin-bottom: 5px; font-size: 0.9rem; }

        input, select {
            width: 100%;
            padding: 12px;
            margin: 5px 0 10px 0;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            box-sizing: border-box;
            font-size: 1rem;
        }

        .btn {
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-weight: 800;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-transform: uppercase;
        }

        .btn-main { background: var(--primary); color: #000; width: 100%; }
        .btn-del { background: var(--accent); color: white; flex: 1; }

        .flex-row { display: flex; gap: 10px; }

        .channel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 12px;
            margin-top: 15px;
        }

        .channel-card {
            background: #1e293b;
            padding: 12px;
            border-radius: 10px;
            border-left: 5px solid var(--secondary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .channel-card:focus { outline: 3px solid var(--primary); background: #334155; }

        .channel-name {
            font-weight: 600;
            font-size: 1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
        }

        .play-btn {
            background: var(--success);
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        .group-badge {
            font-size: 0.75rem;
            background: #475569;
            padding: 2px 8px;
            border-radius: 4px;
            color: #cbd5e1;
            margin-top: 5px;
            display: inline-block;
        }

        .empty-msg { text-align: center; color: #64748b; padding: 30px; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1><i class="fas fa-play-circle"></i> REPRODUCTOR M3U</h1>
    </div>

    <div class="section-box">
        <label><i class="fas fa-file-import"></i> 1. Cargar Nueva Lista:</label>
        <input type="text" id="listName" placeholder="Nombre (ej: Películas)">
        <button class="btn btn-main" onclick="document.getElementById('fileInput').click()">
            <i class="fas fa-plus"></i> SELECCIONAR Y GUARDAR
        </button>
        <input type="file" id="fileInput" accept=".m3u,.m3u8" style="display:none">
    </div>

    <div class="section-box">
        <label><i class="fas fa-database"></i> 2. Mis Listas Guardadas:</label>
        <div class="flex-row">
            <select id="listsDropdown" onchange="loadSavedList()">
                <option value="">-- Selecciona una lista --</option>
            </select>
            <button class="btn btn-del" onclick="deleteList()"><i class="fas fa-trash"></i></button>
        </div>
    </div>

    <div class="section-box" id="filterBox" style="display:none">
        <label><i class="fas fa-filter"></i> 3. Categoría:</label>
        <select id="groupDropdown" onchange="filterChannels()">
            <option value="ALL">-- TODAS LAS CATEGORÍAS --</option>
        </select>
    </div>

    <div id="contentArea" class="channel-grid">
        <div class="empty-msg">Carga una lista para comenzar.</div>
    </div>
</div>

<script>
    const STORAGE_KEY = 'm3u_vault_v2';
    let allChannels = [];

    window.onload = refreshDropdown;

    document.getElementById('fileInput').onchange = function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const name = document.getElementById('listName').value.trim() || file.name;
        const reader = new FileReader();
        reader.onload = (ev) => {
            saveList(name, ev.target.result);
            parseM3U(ev.target.result);
        };
        reader.readAsText(file);
    };

    function saveList(name, content) {
        try {
            let data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
            data[name] = content;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            refreshDropdown();
            alert('Lista "' + name + '" guardada correctamente.');
        } catch(e) {
            alert('Error: La lista es muy grande para la memoria interna.');
        }
    }

    function refreshDropdown() {
        const drop = document.getElementById('listsDropdown');
        const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
        drop.innerHTML = '<option value="">-- Selecciona una lista --</option>';
        for (let n in data) {
            let o = document.createElement('option');
            o.value = n; o.textContent = n;
            drop.appendChild(o);
        }
    }

    function loadSavedList() {
        const name = document.getElementById('listsDropdown').value;
        const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
        if (name && data[name]) {
            parseM3U(data[name]);
        }
    }

    function deleteList() {
        const name = document.getElementById('listsDropdown').value;
        if (!name) return;
        if (confirm('¿Borrar ' + name + '?')) {
            let data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
            delete data[name];
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            location.reload();
        }
    }

    function parseM3U(content) {
        const lines = content.split(/\r?\n/);
        allChannels = [];
        let groups = new Set();
        let currentName = "";
        let currentGroup = "Sin Categoría";

        lines.forEach(line => {
            line = line.trim();
            if (line.startsWith('#EXTINF')) {
                const namePart = line.split(',').pop();
                currentName = namePart || "Canal";
                const groupMatch = line.match(/group-title="([^"]+)"/i);
                currentGroup = groupMatch ? groupMatch[1] : "Sin Categoría";
                groups.add(currentGroup);
            } else if (line.startsWith('http')) {
                allChannels.push({ name: currentName, group: currentGroup, url: line });
                currentName = ""; currentGroup = "Sin Categoría";
            }
        });

        const gDrop = document.getElementById('groupDropdown');
        gDrop.innerHTML = '<option value="ALL">-- TODAS LAS CATEGORÍAS --</option>';
        Array.from(groups).sort().forEach(g => {
            let o = document.createElement('option');
            o.value = g; o.textContent = g;
            gDrop.appendChild(o);
        });
        document.getElementById('filterBox').style.display = 'block';
        render(allChannels);
    }

    function filterChannels() {
        const group = document.getElementById('groupDropdown').value;
        const filtered = (group === 'ALL') ? allChannels : allChannels.filter(c => c.group === group);
        render(filtered);
    }

    function render(list) {
        const area = document.getElementById('contentArea');
        area.innerHTML = '';
        list.forEach(c => {
            const div = document.createElement('div');
            div.className = 'channel-card';
            div.tabIndex = 0;
            div.innerHTML = `
                <div>
                    <span class="channel-name">${c.name}</span><br>
                    <span class="group-badge">${c.group}</span>
                </div>
                <button class="play-btn" onclick="window.location.href='vlc://${c.url}'">
                    <i class="fas fa-play"></i>
                </button>
            `;
            area.appendChild(div);
        });
    }
</script>
</body>
</html>
