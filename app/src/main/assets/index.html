<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REPRODUCTOR M3U</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff; /* Cian vibrante */
            --secondary: #7000ff; /* Morado eléctrico */
            --bg: #050a14;
            --card: #101827;
            --text: #ffffff;
            --accent: #ff007a; /* Rosa neón */
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: radial-gradient(circle at top, #1e1b4b, var(--bg));
            color: var(--text);
            margin: 0;
            padding: 15px;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            padding: 20px;
            background: linear-gradient(90deg, var(--secondary), var(--primary));
            border-radius: 15px;
            margin-bottom: 25px;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
        }

        .header h1 {
            margin: 0;
            font-size: 2.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .section-box {
            background: var(--card);
            border: 1px solid #1e293b;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            box-sizing: border-box;
        }

        .btn {
            padding: 12px 20px;
            border-radius: 8px;
            border: none;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-transform: uppercase;
        }

        .btn-main { background: var(--primary); color: #000; width: 100%; }
        .btn-load { background: var(--secondary); color: white; flex: 2; }
        .btn-del { background: var(--accent); color: white; flex: 1; }

        .flex-row { display: flex; gap: 10px; margin-top: 10px; }

        .channel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .channel-card {
            background: #1e293b;
            padding: 15px;
            border-radius: 12px;
            border-bottom: 4px solid var(--primary);
            transition: transform 0.2s;
        }

        .channel-card:focus {
            outline: 4px solid white;
            transform: scale(1.03);
            background: #334155;
        }

        .channel-name {
            display: block;
            font-weight: bold;
            margin-bottom: 12px;
            font-size: 1.1rem;
            color: var(--primary);
        }

        .play-btn {
            background: #10b981;
            color: white;
            padding: 10px;
            border-radius: 6px;
            width: 100%;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        .empty-msg { text-align: center; color: #64748b; padding: 40px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1><i class="fas fa-bolt"></i> REPRODUCTOR M3U</h1>
    </div>

    <!-- SECCIÓN: CARGA -->
    <div class="section-box">
        <label><i class="fas fa-plus-circle"></i> Nueva Lista:</label>
        <input type="text" id="listName" placeholder="Nombre de la lista (ej: Mi TV)">
        <button class="btn btn-main" onclick="document.getElementById('fileInput').click()">
            <i class="fas fa-file-m3u"></i> CARGAR Y GUARDAR ARCHIVO
        </button>
        <input type="file" id="fileInput" accept=".m3u,.m3u8" style="display:none">
    </div>

    <!-- SECCIÓN: SELECTOR -->
    <div class="section-box">
        <label><i class="fas fa-layer-group"></i> Mis Listas Guardadas:</label>
        <select id="listsDropdown">
            <option value="">-- Selecciona una lista --</option>
        </select>
        <div class="flex-row">
            <button class="btn btn-load" onclick="loadSelected()"><i class="fas fa-eye"></i> Visualizar</button>
            <button class="btn btn-del" onclick="deleteCurrent()"><i class="fas fa-trash"></i></button>
        </div>
    </div>

    <div id="contentArea" class="channel-grid">
        <div class="empty-msg">Carga un archivo M3U para empezar.</div>
    </div>
</div>

<script>
    const STORAGE_KEY = 'm3u_player_data';

    // Inicializar
    window.onload = updateDropdown;

    document.getElementById('fileInput').onchange = function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const name = document.getElementById('listName').value.trim() || file.name;
        const reader = new FileReader();
        reader.onload = (event) => {
            saveData(name, event.target.result);
            processM3U(event.target.result);
        };
        reader.readAsText(file);
    };

    function saveData(name, content) {
        try {
            let data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
            data[name] = content;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            updateDropdown();
            alert('¡Lista "' + name + '" guardada con éxito!');
        } catch(e) {
            alert('Error al guardar. Puede que la lista sea demasiado grande.');
        }
    }

    function updateDropdown() {
        const dropdown = document.getElementById('listsDropdown');
        const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');

        dropdown.innerHTML = '<option value="">-- Selecciona una lista --</option>';
        for (let name in data) {
            let opt = document.createElement('option');
            opt.value = name;
            opt.textContent = name;
            dropdown.appendChild(opt);
        }
    }

    function loadSelected() {
        const val = document.getElementById('listsDropdown').value;
        const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
        if (val && data[val]) {
            processM3U(data[val]);
        }
    }

    function deleteCurrent() {
        const val = document.getElementById('listsDropdown').value;
        if (!val) return;
        if (confirm('¿Eliminar la lista "' + val + '"?')) {
            let data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
            delete data[val];
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            updateDropdown();
            document.getElementById('contentArea').innerHTML = '<div class="empty-msg">Lista eliminada.</div>';
        }
    }

    function processM3U(content) {
        const lines = content.split(/\r?\n/);
        const channels = [];
        let currentInfo = "";

        for (let i = 0; i < lines.length; i++) {
            let line = lines[i].trim();
            if (line.startsWith('#EXTINF')) {
                currentInfo = line.split(',').pop();
            } else if (line.length > 5 && !line.startsWith('#')) {
                channels.push({
                    name: currentInfo || "Canal sin nombre",
                    url: line
                });
                currentInfo = "";
            }
        }

        render(channels);
    }

    function render(channels) {
        const area = document.getElementById('contentArea');
        area.innerHTML = '';

        if (channels.length === 0) {
            area.innerHTML = '<div class="empty-msg">No se encontraron enlaces de video válidos.</div>';
            return;
        }

        channels.forEach(c => {
            const card = document.createElement('div');
            card.className = 'channel-card';
            card.tabIndex = 0;
            card.innerHTML = `
                <span class="channel-name">${c.name}</span>
                <button class="play-btn" onclick="window.location.href='play://${c.url}'">
                    <i class="fas fa-play"></i> REPRODUCIR
                </button>
            `;
            area.appendChild(card);
        });
    }
</script>

</body>
</html>
