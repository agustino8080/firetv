<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Direct Downloader</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #dc2626;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f1f5f9;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: var(--card);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            color: #ef4444;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .upload-area {
            border: 2px dashed #475569;
            padding: 40px;
            text-align: center;
            border-radius: 12px;
            cursor: pointer;
            background: #0f172a;
            transition: all 0.3s;
            margin-bottom: 20px;
        }

        .upload-area:hover {
            border-color: var(--primary);
            background: #1e293b;
        }

        #fileInput { display: none; }

        .btn-select {
            background-color: var(--primary);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            margin-top: 15px;
        }

        .video-list {
            margin-top: 20px;
            display: grid;
            gap: 12px;
        }

        .video-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: #334155;
            border-radius: 10px;
            border: 1px solid #475569;
            transition: transform 0.2s;
        }

        .video-item:hover {
            transform: translateX(5px);
            border-color: var(--primary);
        }

        .video-info {
            flex: 1;
            overflow: hidden;
        }

        .video-name {
            font-weight: 600;
            display: block;
            white-space: nowrap;
            text-overflow: ellipsis;
            overflow: hidden;
            font-size: 1rem;
        }

        .video-ext {
            font-size: 0.75rem;
            background: #ef4444;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 8px;
            text-transform: uppercase;
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        .btn-download {
            background: #10b981;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
            text-decoration: none;
        }

        .btn-download:hover {
            background: #059669;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
        }

        .instructions {
            background: #450a0a;
            border: 1px solid #ef4444;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            color: #fecaca;
        }
    </style>
</head>
<body>

<div class="container">
    <h1><i class="fas fa-bolt"></i> Descargador M3U</h1>
    <p class="subtitle">Herramienta para Android y Fire TV</p>

    <div class="instructions">
        <i class="fas fa-info-circle"></i> <b>Uso:</b> Carga un archivo .m3u para listar los videos y descargarlos directamente a tu dispositivo.
    </div>

    <div class="upload-area" id="dropArea">
        <i class="fas fa-file-alt fa-3x" style="color: #64748b"></i>
        <p>Selecciona tu lista M3U</p>
        <button class="btn-select" onclick="document.getElementById('fileInput').click()">CARGAR LISTA</button>
        <input type="file" id="fileInput" accept=".m3u,.m3u8">
    </div>

    <div id="videoList" class="video-list"></div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const videoList = document.getElementById('videoList');
    const videoExtensions = ['.mp4', '.mkv', '.avi', '.mov', '.wmv', '.flv', '.webm', '.ts', '.m4v'];

    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (e) => parseM3U(e.target.result);
        reader.readAsText(file);
    });

    function parseM3U(content) {
        const lines = content.split('\n');
        const videos = [];
        let currentName = "Video_Descargado";

        lines.forEach(line => {
            line = line.trim();
            if (line.startsWith('#EXTINF')) {
                const parts = line.split(',');
                currentName = parts[parts.length - 1].trim() || "Video_Descargado";
            } else if (line.length > 0 && !line.startsWith('#')) {
                const url = line;
                const extension = videoExtensions.find(ext => url.toLowerCase().includes(ext));

                if (extension) {
                    videos.push({ name: currentName, url: url, ext: extension });
                }
                currentName = "Video_Descargado";
            }
        });

        renderList(videos);
    }

    function renderList(videos) {
        videoList.innerHTML = '';
        if (videos.length === 0) {
            videoList.innerHTML = '<p style="text-align:center; color:#94a3b8;">No se detectaron videos.</p>';
            return;
        }

        videos.forEach(video => {
            const cleanName = video.name.replace(/[<>:"/\\|?*]/g, '') + video.ext;
            const item = document.createElement('div');
            item.className = 'video-item';
            item.innerHTML = `
                <div class="video-info">
                    <span class="video-name">${video.name}</span>
                </div>
                <div class="actions">
                    <button onclick="window.location.href='${video.url}'" class="btn-download">
                        <i class="fas fa-download"></i> DESCARGAR
                    </button>
                </div>
            `;
            videoList.appendChild(item);
        });
    }
</script>

</body>
</html>
