<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REPRODUCTOR M3U PRO</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --bg: #050a14;
            --card: #101827;
            --text: #ffffff;
            --accent: #ff007a;
            --success: #10b981;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: radial-gradient(circle at top, #1e1b4b, var(--bg));
            color: var(--text);
            margin: 0;
            padding: 10px;
            min-height: 100vh;
        }

        .container { max-width: 900px; margin: 0 auto; }

        /* Reproductor Flotante/Integrado */
        #playerContainer {
            width: 100%;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 20px;
            display: none;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 5px 25px rgba(0,0,0,0.8);
        }

        video { width: 100%; aspect-ratio: 16/9; display: block; }

        .header {
            text-align: center;
            padding: 15px;
            background: linear-gradient(90deg, var(--secondary), var(--primary));
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .header h1 { margin: 0; font-size: 1.5rem; text-transform: uppercase; }

        .section-box {
            background: var(--card);
            border: 1px solid #1e293b;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin: 5px 0 10px 0;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            box-sizing: border-box;
        }

        .btn {
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-weight: 800;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-transform: uppercase;
        }

        .btn-main { background: var(--primary); color: #000; width: 100%; }
        .btn-del { background: var(--accent); color: white; flex: 1; }

        .flex-row { display: flex; gap: 10px; }

        .channel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 12px;
            margin-top: 15px;
        }

        .channel-card {
            background: #1e293b;
            padding: 12px;
            border-radius: 10px;
            border-left: 5px solid var(--secondary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .channel-card:focus { outline: 3px solid var(--primary); background: #334155; }

        .channel-info { flex: 1; overflow: hidden; margin-right: 10px; }
        .channel-name { font-weight: 600; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .btn-play { background: var(--success); color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; }
        .btn-external { background: var(--secondary); color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; margin-left: 5px; }

        .group-badge { font-size: 0.7rem; background: #475569; padding: 2px 6px; border-radius: 4px; color: #cbd5e1; }
    </style>
</head>
<body>

<div class="container">
    <!-- Reproductor Integrado -->
    <div id="playerContainer">
        <video id="videoPlayer" controls></video>
        <button class="btn" style="width:100%; border-radius:0; background:#334155; color:white;" onclick="closePlayer()">CERRAR REPRODUCTOR</button>
    </div>

    <div class="header">
        <h1><i class="fas fa-bolt"></i> REPRODUCTOR M3U</h1>
    </div>

    <div class="section-box">
        <label>1. Nombre para la Nueva Lista:</label>
        <input type="text" id="listName" placeholder="Ej: Mis Canales">
        <button class="btn btn-main" onclick="document.getElementById('fileInput').click()">
            <i class="fas fa-plus"></i> SELECCIONAR Y AGREGAR
        </button>
        <input type="file" id="fileInput" accept=".m3u,.m3u8" style="display:none">
    </div>

    <div class="section-box">
        <label>2. Tus Listas:</label>
        <div class="flex-row">
            <select id="listsDropdown" onchange="loadSavedList()">
                <option value="">-- Selecciona una lista --</option>
            </select>
            <button class="btn btn-del" onclick="deleteList()"><i class="fas fa-trash"></i></button>
        </div>
    </div>

    <div class="section-box" id="filterBox" style="display:none">
        <label>3. Filtrar Categoría:</label>
        <select id="groupDropdown" onchange="filterChannels()">
            <option value="ALL">-- TODAS --</option>
        </select>
    </div>

    <div id="contentArea" class="channel-grid"></div>
</div>

<script>
    const STORAGE_KEY = 'm3u_ultimate_storage';
    let allChannels = [];
    const video = document.getElementById('videoPlayer');
    const playerContainer = document.getElementById('playerContainer');
    let hls = null;

    window.onload = refreshDropdown;

    document.getElementById('fileInput').onchange = function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const name = document.getElementById('listName').value.trim() || file.name;
        const reader = new FileReader();
        reader.onload = (ev) => {
            saveList(name, ev.target.result);
            parseM3U(ev.target.result);
            document.getElementById('listName').value = ""; // Limpiar para la próxima
        };
        reader.readAsText(file);
    };

    function saveList(name, content) {
        try {
            let data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
            data[name] = content; // Aquí agregamos al objeto existente, no sobrescribimos
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            refreshDropdown();
            alert('Lista "' + name + '" guardada.');
        } catch(e) {
            alert('Error al guardar. LocalStorage lleno o archivo corrupto.');
        }
    }

    function refreshDropdown() {
        const drop = document.getElementById('listsDropdown');
        const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
        drop.innerHTML = '<option value="">-- Selecciona una lista --</option>';
        for (let n in data) {
            let o = document.createElement('option');
            o.value = n; o.textContent = n;
            drop.appendChild(o);
        }
    }

    function loadSavedList() {
        const name = document.getElementById('listsDropdown').value;
        const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
        if (name && data[name]) {
            parseM3U(data[name]);
        }
    }

    function deleteList() {
        const name = document.getElementById('listsDropdown').value;
        if (!name) return;
        if (confirm('¿Eliminar ' + name + '?')) {
            let data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
            delete data[name];
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            refreshDropdown();
            document.getElementById('contentArea').innerHTML = '';
        }
    }

    function parseM3U(content) {
        const lines = content.split(/\r?\n/);
        allChannels = [];
        let groups = new Set();
        let currentName = "";
        let currentGroup = "General";

        lines.forEach(line => {
            line = line.trim();
            if (line.startsWith('#EXTINF')) {
                currentName = line.split(',').pop() || "Canal";
                const groupMatch = line.match(/group-title="([^"]+)"/i);
                currentGroup = groupMatch ? groupMatch[1] : "General";
                groups.add(currentGroup);
            } else if (line.startsWith('http')) {
                allChannels.push({ name: currentName, group: currentGroup, url: line });
            }
        });

        const gDrop = document.getElementById('groupDropdown');
        gDrop.innerHTML = '<option value="ALL">-- TODAS LAS CATEGORÍAS --</option>';
        Array.from(groups).sort().forEach(g => {
            let o = document.createElement('option');
            o.value = g; o.textContent = g;
            gDrop.appendChild(o);
        });
        document.getElementById('filterBox').style.display = 'block';
        render(allChannels);
    }

    function filterChannels() {
        const group = document.getElementById('groupDropdown').value;
        const filtered = (group === 'ALL') ? allChannels : allChannels.filter(c => c.group === group);
        render(filtered);
    }

    function render(list) {
        const area = document.getElementById('contentArea');
        area.innerHTML = '';
        list.forEach(c => {
            const div = document.createElement('div');
            div.className = 'channel-card';
            div.tabIndex = 0;
            div.innerHTML = `
                <div class="channel-info">
                    <span class="channel-name">${c.name}</span>
                    <span class="group-badge">${c.group}</span>
                </div>
                <div style="display:flex">
                    <button class="btn-play" onclick="playInApp('${c.url}')"><i class="fas fa-play"></i></button>
                    <button class="btn-external" onclick="playExternal('${c.url}')"><i class="fas fa-external-link-alt"></i></button>
                </div>
            `;
            area.appendChild(div);
        });
    }

    function playInApp(url) {
        playerContainer.style.display = 'block';
        window.scrollTo(0,0);

        if (Hls.isSupported()) {
            if (hls) hls.destroy();
            hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = url;
            video.addEventListener('loadedmetadata', () => video.play());
        }
    }

    function closePlayer() {
        video.pause();
        playerContainer.style.display = 'none';
        if (hls) hls.destroy();
    }

    function playExternal(url) {
        window.location.href = "vlc://" + url;
    }
</script>
</body>
</html>
