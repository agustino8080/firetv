<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REPRODUCTOR M3U PRO</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --secondary: #ef4444;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f1f5f9;
            --accent: #8b5cf6;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 10px;
        }

        .header h1 { color: var(--primary); margin: 0; font-size: 1.8rem; }

        .setup-section {
            background: #0f172a;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: grid;
            gap: 10px;
        }

        input, select, button {
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #475569;
            background: #1e293b;
            color: white;
            font-size: 1rem;
        }

        .btn-group { display: flex; gap: 10px; }
        .btn-primary { background: var(--primary); cursor: pointer; border: none; font-weight: bold; flex: 1; }
        .btn-secondary { background: var(--accent); cursor: pointer; border: none; font-weight: bold; }

        .list-selector {
            margin: 15px 0;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .channel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }

        .channel-item {
            background: #334155;
            padding: 15px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border-left: 4px solid var(--primary);
            transition: transform 0.2s;
        }

        .channel-item:focus {
            outline: 3px solid white;
            transform: scale(1.02);
            background: #475569;
        }

        .channel-name { font-weight: bold; font-size: 1.1rem; }

        .actions { display: flex; gap: 8px; }
        .btn-play { background: #10b981; flex: 2; border: none; border-radius: 4px; color: white; padding: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .btn-dl { background: #64748b; flex: 1; border: none; border-radius: 4px; color: white; padding: 8px; cursor: pointer; }

        @media (max-width: 600px) {
            .channel-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1><i class="fas fa-play-circle"></i> REPRODUCTOR M3U</h1>
    </div>

    <div class="setup-section">
        <input type="text" id="listName" placeholder="Nombre de la lista (ej: Películas)">
        <div class="btn-group">
            <button class="btn-primary" onclick="document.getElementById('fileInput').click()">
                <i class="fas fa-file-upload"></i> CARGAR ARCHIVO M3U
            </button>
            <input type="file" id="fileInput" accept=".m3u,.m3u8" style="display:none">
        </div>
    </div>

    <div class="list-selector">
        <label><i class="fas fa-list"></i> Tus Listas Guardadas:</label>
        <div class="btn-group">
            <select id="savedListsSelect" style="flex:1"></select>
            <button class="btn-secondary" onclick="loadSelectedList()">VER LISTA</button>
            <button style="background:#ef4444; border:none;" onclick="deleteList()"><i class="fas fa-trash"></i></button>
        </div>
    </div>

    <div id="channelList" class="channel-grid"></div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const listNameInput = document.getElementById('listName');
    const savedListsSelect = document.getElementById('savedListsSelect');
    const channelList = document.getElementById('channelList');

    // Cargar listas al iniciar
    window.onload = refreshSavedLists;

    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const name = listNameInput.value || file.name;
        const reader = new FileReader();
        reader.onload = (e) => {
            saveToLocal(name, e.target.result);
            parseAndRender(e.target.result);
        };
        reader.readAsText(file);
    });

    function saveToLocal(name, content) {
        let lists = JSON.parse(localStorage.getItem('m3u_lists') || '{}');
        lists[name] = content;
        localStorage.setItem('m3u_lists', JSON.stringify(lists));
        refreshSavedLists();
        alert('Lista "' + name + '" guardada correctamente.');
    }

    function refreshSavedLists() {
        let lists = JSON.parse(localStorage.getItem('m3u_lists') || '{}');
        savedListsSelect.innerHTML = '';
        for (let name in lists) {
            let opt = document.createElement('option');
            opt.value = name;
            opt.textContent = name;
            savedListsSelect.appendChild(opt);
        }
    }

    function loadSelectedList() {
        let lists = JSON.parse(localStorage.getItem('m3u_lists') || '{}');
        let selected = savedListsSelect.value;
        if (selected && lists[selected]) {
            parseAndRender(lists[selected]);
        }
    }

    function deleteList() {
        let selected = savedListsSelect.value;
        if (selected && confirm('¿Borrar lista?')) {
            let lists = JSON.parse(localStorage.getItem('m3u_lists') || '{}');
            delete lists[selected];
            localStorage.setItem('m3u_lists', JSON.stringify(lists));
            refreshSavedLists();
            channelList.innerHTML = '';
        }
    }

    function parseAndRender(content) {
        const lines = content.split('\n');
        const channels = [];
        let currentName = "Canal desconocido";

        lines.forEach(line => {
            line = line.trim();
            if (line.startsWith('#EXTINF')) {
                const parts = line.split(',');
                currentName = parts[parts.length - 1].trim() || "Canal";
            } else if (line.length > 0 && !line.startsWith('#')) {
                channels.push({ name: currentName, url: line });
                currentName = "Canal";
            }
        });

        renderChannels(channels);
    }

    function renderChannels(channels) {
        channelList.innerHTML = '';
        channels.forEach(ch => {
            const div = document.createElement('div');
            div.className = 'channel-item';
            div.tabIndex = 0; // Habilita navegación con mando
            div.innerHTML = `
                <span class="channel-name">${ch.name}</span>
                <div class="actions">
                    <button class="btn-play" onclick="playVideo('${ch.url}')">
                        <i class="fas fa-play"></i> REPRODUCIR
                    </button>
                    <button class="btn-dl" onclick="window.location.href='${ch.url}'">
                        <i class="fas fa-download"></i>
                    </button>
                </div>
            `;
            channelList.appendChild(div);
        });
    }

    function playVideo(url) {
        // Al navegar a una URL de video, la lógica Java la interceptará para abrir el reproductor
        window.location.href = "play://" + url;
    }
</script>

</body>
</html>
